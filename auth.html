<div id="auth-page">
   <div id="login-container">
      <h1>Login</h1>
      <div id="login-info">
         <div class="login-input">
            <label for="user-email">E-Mail</label>
            <input type="email" name="user-email" id="userEmail">
         </div>
         <div class="login-input">
            <label for="user-pass">Password</label>
            <input type="password" name="user-pass" id="userPassword">
         </div>
         <button id="login-submit-btn">Login</button>
         <span class="auth-bottom-text">Don't have an account?<span id="switch-to-reg">Create Account</span></span>
      </div>
   </div>
   
   <div id="reg-container">
      <h1>Create Account</h1>
      <div id="reg-info">
         <div class="reg-input">
            <label for="user-name">Name</label>
            <input type="text" name="user-name" id="user-name">
         </div>
         <div class="reg-input">
            <label for="user-email">Email</label>
            <input type="email" name="user-email" id="user-email">
         </div>
         <div class="reg-input">
            <label for="user-phone">Phone</label>
            <input type="number" name="user-phonr" id="user-phone">
         </div>
         <div class="reg-input">
            <label for="user-pincode">Pincode</label>
            <input type="number" name="user-pincode" id="user-pincode">
         </div>
         <div class="reg-input">
            <label for="user-pass">Password</label>
            <input type="password" name="user-pass" id="user-pass">
         </div>
         <button id="reg-submit-btn">Create Account</button>
         <span class="auth-bottom-text">Already have an account?<span id="switch-to-login">Log in</span></span>
      </div>
   </div>
</div>
