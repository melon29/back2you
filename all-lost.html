<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Lost Pets</title>

<link rel="stylesheet" href="index.css">

<style>
body {
  padding: 30px;
  background: #f4f6f8;
  font-family: Lato, sans-serif;
}

h1 {
  text-align: center;
  margin-bottom: 25px;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

.top-bar input,
.top-bar select {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.pet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.pet-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.pet-card:hover {
  transform: translateY(-6px);
}

.pet-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.pet-info {
  padding: 12px;
}

.pet-info h3 {
  margin-bottom: 6px;
}

.back-btn {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  background: black;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}
</style>

</head>
<body>

<a href="index.html" class="back-btn">← Back</a>

<h1>All Lost Pets</h1>

<div class="top-bar">
  <input type="text" id="searchInput" placeholder="Search by location...">
  <select id="typeFilter">
    <option value="">All Types</option>
    <option value="Dog">Dog</option>
    <option value="Cat">Cat</option>
  </select>
</div>

<div class="pet-grid" id="petGrid"></div>

<script>
const pets = JSON.parse(localStorage.getItem("pets")) || [];
const grid = document.getElementById("petGrid");
const searchInput = document.getElementById("searchInput");
const typeFilter = document.getElementById("typeFilter");

function displayPets() {
  grid.innerHTML = "";

  const filtered = pets.filter(p =>
    p.category === "lost" &&
    p.location.toLowerCase().includes(searchInput.value.toLowerCase()) &&
    (typeFilter.value === "" || p.type === typeFilter.value)
  );

  if(filtered.length === 0){
    grid.innerHTML = "<h3>No matching pets found.</h3>";
    return;
  }

  filtered.forEach(pet => {
    const card = document.createElement("div");
    card.className = "pet-card";
    card.innerHTML = `
      <img src="${pet.image}">
      <div class="pet-info">
        <h3>${pet.name || "Unknown"}</h3>
        <p><b>Location:</b> ${pet.location}</p>
        <p><b>Type:</b> ${pet.type}</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

searchInput.addEventListener("input", displayPets);
typeFilter.addEventListener("change", displayPets);

displayPets();
</script>

</body>
</html>
