<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Lost & Found Pets</title>
  <link rel="stylesheet" href="lostfoundpets.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <h1 style="text-align:center; margin-top:20px;">
    All Lost & Found Pets
  </h1>
</header>

<section id="allPetsContainer" style="padding:40px;">
</section>

<script src="pets.js"></script>

<script>
  const container = document.getElementById("allPetsContainer");

  function renderAllPets() {
    container.innerHTML = "";

    const petsData = localStorage.getItem("pets");

    if (!petsData) {
      container.innerHTML = "<p>No pets reported yet.</p>";
      return;
    }

    const pets = JSON.parse(petsData);

    if (pets.length === 0) {
      container.innerHTML = "<p>No pets reported yet.</p>";
      return;
    }

    pets.forEach(pet => {
      const card = document.createElement("div");
      card.className = "pet-card";

      card.innerHTML = `
        <h3>${pet.name || "No Name"}</h3>
        <p><strong>Type:</strong> ${pet.type || "Not specified"}</p>
        <p><strong>Status:</strong> ${pet.status || "Unknown"}</p>
        <p><strong>Location:</strong> ${pet.location || "Not provided"}</p>
      `;

      container.appendChild(card);
    });
  }

  renderAllPets();
</script>

</body>
</html>
