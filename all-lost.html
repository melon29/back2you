<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Lost & Found Pets</title>
  <link rel="stylesheet" href="lostfoundpets.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>

<header>
  <h1 style="text-align:center; margin-top:20px;">
    All Lost & Found Pets
  </h1>
</header>

<section id="allPetsContainer" style="padding:40px;">
</section>

<script src="pets.js"></script>

<script>
  const container = document.getElementById("allPetsContainer");

  function renderAllPets() {
    container.innerHTML = "";

    if (!localStorage.getItem("pets")) {
      container.innerHTML = "<p>No pets reported yet.</p>";
      return;
    }

    const pets = JSON.parse(localStorage.getItem("pets"));

    pets.forEach(pet => {
      const card = document.createElement("div");
      card.className = "pet-card";
      card.innerHTML = `
        <h3>${pet.name}</h3>
        <p><strong>Type:</strong> ${pet.type}</p>
        <p><strong>Status:</strong> ${pet.status}</p>
        <p><strong>Location:</strong> ${pet.location}</p>
      ;
      container.appendChild(card);
    });
  }

  renderAllPets();
</script>

</body>
</html>
