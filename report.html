<!DOCTYPE html>
<html>
<head>
  <title>Report Pet</title>
</head>
<body>

<h2>Report Lost or Found Pet</h2>

<form id="petForm">
  <input type="text" id="name" placeholder="Pet Name" required><br><br>

  <select id="status" required>
    <option value="">Select Status</option>
    <option value="Lost">Lost</option>
    <option value="Found">Found</option>
  </select><br><br>

  <input type="text" id="type" placeholder="Animal Type" required><br><br>

  <input type="text" id="location" placeholder="Location" required><br><br>

  <textarea id="description" placeholder="Description" required></textarea><br><br>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("petForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const pet = {
    name: document.getElementById("name").value,
    status: document.getElementById("status").value,
    type: document.getElementById("type").value,
    location: document.getElementById("location").value,
    description: document.getElementById("description").value
  };

  let pets = JSON.parse(localStorage.getItem("pets")) || [];
  pets.push(pet);
  localStorage.setItem("pets", JSON.stringify(pets));

  alert("Pet Saved Successfully!");
  this.reset();
});
</script>

</body>
</html>
